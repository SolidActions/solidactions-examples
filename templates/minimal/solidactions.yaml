# The CLI replaces __PROJECT_NAME__ with the scaffolded project's name.
project: __PROJECT_NAME__

workflows:
  - id: hello
    name: Hello
    file: src/hello.ts
    trigger: webhook
    webhook:
      method: [POST]
      auth: hmac          # Gateway verifies HMAC signatures before the workflow runs.
                          # The secret is auto-generated per workflow — retrieve it with:
                          #   solidactions webhook secret __PROJECT_NAME__
                          # Set the same value in your sender (e.g. Telegram setWebhook secret_token).

env:
  # Workflow-consumed env vars (read via ctx.vars.GREETING):
  - GREETING
